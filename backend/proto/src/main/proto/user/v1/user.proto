syntax = "proto3";

package bunmart.user.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.nsbm.bunmart.user.v1";
option java_multiple_files = true;

// Aligned with User / Address entity and UserResponseDTO / AddressResponseDTO.
// User: id, email, displayName, phone, roles, active, createdAt, updatedAt.
// Address: id, userId, line1, line2, city, state, postalCode, country, type, createdAt, updatedAt.
service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserAddresses(GetUserAddressesRequest) returns (GetUserAddressesResponse);
  rpc ValidateUser(ValidateUserRequest) returns (ValidateUserResponse);
}

message UserInfo {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  string phone = 4;
  repeated string roles = 5;
  bool active = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message AddressInfo {
  string address_id = 1;
  string user_id = 2;
  string line1 = 3;
  string line2 = 4;
  string city = 5;
  string state = 6;
  string postal_code = 7;
  string country = 8;
  string type = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  UserInfo user = 1;
}

message GetUserAddressesRequest {
  string user_id = 1;
}

message GetUserAddressesResponse {
  repeated AddressInfo addresses = 1;
}

message ValidateUserRequest {
  string user_id = 1;
}

message ValidateUserResponse {
  bool valid = 1;
  UserInfo user = 2;
}
