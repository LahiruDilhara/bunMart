spring:
  application:
    name: bunMart
  cloud:
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
    refresh:
      enabled: false

server:
  port: 8080

# Local backend ports (each service has server.port set to match):
# 8081 product, 8082 cart, 8083 orders, 8084 payments, 8085 kitchen,
# 8086 notification, 8087 shipping, 8088 pricing, 8089 reviews, 8090 users
spring.cloud.gateway:
  routes:
    - id: product-service
      uri: http://localhost:8081
      predicates:
        - Path=/api/v1/products/**,/api/v1/categories/**
    - id: cart-service
      uri: http://localhost:8082
      predicates:
        - Path=/api/v1/cart/**
    - id: order-service
      uri: http://localhost:8083
      predicates:
        - Path=/api/v1/orders/**
    - id: payment-service
      uri: http://localhost:8084
      predicates:
        - Path=/api/v1/payments/**,/api/v1/stripe/**
    - id: kitchen-service
      uri: http://localhost:8085
      predicates:
        - Path=/api/v1/kitchen-orders/**
    - id: notification-service
      uri: http://localhost:8086
      predicates:
        - Path=/api/v1/notifications/**,/api/v1/templates/**
    - id: shipping-service
      uri: http://localhost:8087
      predicates:
        - Path=/api/v1/shipping/**
    - id: pricing-service
      uri: http://localhost:8088
      predicates:
        - Path=/api/v1/pricing/**
    - id: review-service
      uri: http://localhost:8089
      predicates:
        - Path=/api/v1/reviews/**
    - id: user-service
      uri: http://localhost:8090
      predicates:
        - Path=/api/v1/users/**
