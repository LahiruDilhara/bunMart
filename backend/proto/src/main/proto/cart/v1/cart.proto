syntax = "proto3";

package bunmart.cart.v1;

option java_package = "com.nsbm.bunmart.cart.v1";
option java_multiple_files = true;

// Aligned with Cart / CartItem entity and CartResponseDTO / CartItemResponseDTO: id, userId, cartItems (id, productId, quantity).
service CartService {
  rpc GetCart(GetCartRequest) returns (GetCartResponse);
  rpc RemoveCartItems(RemoveCartItemsRequest) returns (RemoveCartItemsResponse);
}

// CartItemResponseDTO: id, productId, quantity.
message CartItemInfo {
  string item_id = 1;   // CartItem.id (Integer) as string for proto
  string product_id = 2;
  int32 quantity = 3;
}

// CartResponseDTO: id, userId, cartItems.
message CartInfo {
  string cart_id = 1;   // Cart.id (Integer) as string
  string user_id = 2;
  repeated CartItemInfo items = 3;
}

message GetCartRequest {
  string user_id = 1;
}

message GetCartResponse {
  CartInfo cart = 1;
}

message RemoveCartItemsRequest {
  string user_id = 1;
  repeated string product_ids = 2;
}

message RemoveCartItemsResponse {
  bool removed = 1;
}
