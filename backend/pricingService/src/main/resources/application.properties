spring.application.name=bunMart

spring.datasource.url=jdbc:sqlserver://127.0.0.1:1433;databaseName=bunmart_pricing;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=BunMart@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Add logging for debugging
logging.level.com.nsbm.bunmart.pricing=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

grpc.server.port=9093
server.port=8090