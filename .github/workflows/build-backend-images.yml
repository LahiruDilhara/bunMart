# Build and push backend Docker images (amd64 + arm64) to Nexus.
# Triggers: manual (workflow_dispatch) or push tag v*.*.*
# Secrets: REGISTRY_USERNAME, REGISTRY_PASSWORD
name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the Docker image (e.g. v1.0.0)"
        required: true
        type: string

  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: nexus.lahirudilhara.me
  IMAGE_PREFIX: lahirudilhara

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: backend/api-gateway
            dockerfile: backend/api-gateway/Dockerfile
            image_name: api-gateway
          - service: cartService
            context: backend
            dockerfile: backend/cartService/Dockerfile
            image_name: cartservice
          - service: kitchenService
            context: backend
            dockerfile: backend/kitchenService/Dockerfile
            image_name: kitchenservice
          - service: notificationService
            context: backend
            dockerfile: backend/notificationService/Dockerfile
            image_name: notificationservice
          - service: orderManagementService
            context: backend
            dockerfile: backend/orderManagementService/Dockerfile
            image_name: ordermanagementservice
          - service: paymentService
            context: backend
            dockerfile: backend/paymentService/Dockerfile
            image_name: paymentservice
          - service: pricingService
            context: backend
            dockerfile: backend/pricingService/Dockerfile
            image_name: pricingservice
          - service: productService
            context: backend
            dockerfile: backend/productService/Dockerfile
            image_name: productservice
          - service: reviewService
            context: backend
            dockerfile: backend/reviewService/Dockerfile
            image_name: reviewservice
          - service: shippingService
            context: backend
            dockerfile: backend/shippingService/Dockerfile
            image_name: shippingservice
          - service: userAuthentication
            context: backend
            dockerfile: backend/userAuthentication/Dockerfile
            image_name: userauthenticationservice
          - service: userProfileService
            context: backend
            dockerfile: backend/userProfileService/Dockerfile
            image_name: userprofileservice

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Set version variable
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
            if [[ -z "$V" ]]; then
              V="v0.0.0"
            elif [[ ! "$V" =~ ^v ]]; then
              V="v${V}"
            fi
            echo "VERSION=${V}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/bunmart-${{ matrix.image_name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/bunmart-${{ matrix.image_name }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
