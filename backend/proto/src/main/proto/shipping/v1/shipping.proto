syntax = "proto3";

package bunmart.shipping.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.nsbm.bunmart.shipping.v1";
option java_multiple_files = true;

// Aligned with ShippingPackage entity / CreateShippingPackageRequestDTO / ShippingPackageResponseDTO.
// ShippingPackage: id, weight, destinationAddress, sourceAddress, totalPrice, orderId, shippedAt, progress, status, driver.
service ShippingService {
  rpc CreateShippingPackage(CreateShippingPackageRequest) returns (CreateShippingPackageResponse);
  rpc GetShippingPackage(GetShippingPackageRequest) returns (GetShippingPackageResponse);
  rpc UpdateShippingPackageStatus(UpdateShippingPackageStatusRequest) returns (UpdateShippingPackageStatusResponse);
}

message CreateShippingPackageRequest {
  string user_id = 1;
  string order_id = 2;
  double weight = 3;
  string destination_address = 4;
  string source_address = 5;
  string total_price = 6;
  string driver_id = 7;
}

message CreateShippingPackageResponse {
  string shipping_package_id = 1;
  string status = 2;
}

message GetShippingPackageRequest {
  string shipping_package_id = 1;
}

message GetShippingPackageResponse {
  string shipping_package_id = 1;
  string order_id = 2;
  double weight = 3;
  string destination_address = 4;
  string source_address = 5;
  string total_price = 6;
  int32 progress = 7;
  string status = 8;
  string driver_id = 9;
  google.protobuf.Timestamp shipped_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message UpdateShippingPackageStatusRequest {
  string shipping_package_id = 1;
  string status = 2;
  int32 progress = 3;
}

message UpdateShippingPackageStatusResponse {
  bool updated = 1;
}
