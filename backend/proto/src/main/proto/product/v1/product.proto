syntax = "proto3";

package bunmart.product.v1;

option java_package = "com.nsbm.bunmart.product.v1";
option java_multiple_files = true;

// Aligned with Product entity / ProductResponseDTO: id, name, description, tags, weight, availability, categoryId, hasImage.
service ProductCatalogService {
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
}

message ProductInfo {
  string product_id = 1;
  string name = 2;
  string description = 3;
  repeated string tags = 4;
  string weight = 5;
  bool availability = 6;
  string category_id = 7;  // maps to categoryId (Category.id is Integer, represented as string in proto)
  bool has_image = 8;
}

message GetProductRequest {
  string user_id = 1;
  string product_id = 2;
}

message GetProductResponse {
  ProductInfo product = 1;
}
