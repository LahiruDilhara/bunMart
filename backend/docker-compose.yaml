# BunMart Backend — Central Docker Compose
# 10 minimal PostgreSQL Alpine instances (one per microservice)
# Usage: from backend/ run:  docker compose -f docker-compose.yaml up -d
# Connect: localhost:5432 (product) .. localhost:5441 (user)

services:
  db-product:
    image: postgres:16-alpine
    container_name: bunmart-db-product
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bunmart_product
      POSTGRES_USER: bunmart
      POSTGRES_PASSWORD: bunmart_pass
    volumes:
      - db_product_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunmart -d bunmart_product"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-kitchen:
