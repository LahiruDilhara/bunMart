syntax = "proto3";

package bunmart.order.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.nsbm.bunmart.order.v1";
option java_multiple_files = true;

// Aligned with Order entity / OrderResponseDTO: id, userId, status, subtotal, discountTotal, shippingTotal, total, currencyCode, shippingAddress, shipmentId, paymentId, products (productId, quantity), createdAt, updatedAt.
service OrderService {
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);
}

// OrderProduct / OrderProductDTO: productId, quantity only (order does not store unit_price per line).
message OrderLineInfo {
  string product_id = 1;
  int32 quantity = 2;
}

message OrderInfo {
  string order_id = 1;
  string user_id = 2;
  string status = 3;
  repeated OrderLineInfo lines = 4;
  string subtotal = 5;
  string discount_total = 6;
  string shipping_total = 7;
  string total = 8;
  string currency_code = 9;
  string shipping_address = 10;  // full address string in Order entity
  string shipment_id = 11;
  string payment_id = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message GetOrderRequest {
  string user_id = 1;
  string order_id = 2;
}

message GetOrderResponse {
  OrderInfo order = 1;
}

// Order entity fields that can be updated: status, paymentId, shippingAddress, shipmentId.
message UpdateOrderRequest {
  string user_id = 1;
  string order_id = 2;
  string status = 3;
  string payment_id = 4;
  string shipping_address = 5;
  string shipment_id = 6;
}

message UpdateOrderResponse {
  OrderInfo order = 1;
}
