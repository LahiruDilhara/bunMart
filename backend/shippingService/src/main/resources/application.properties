spring.application.name=shippingService
server.port=6011
grpc.server.port=9009

spring.datasource.url=jdbc:postgresql://localhost:5438/bunmart_shipping
spring.datasource.username=bunmart
spring.datasource.password=bunmart_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# gRPC client: notification service (notify user when shipment delivered)
grpc.client.notificationService.address=static://localhost:9007
grpc.client.notificationService.negotiationType=plaintext
grpc.client.notificationService.enable-keep-alive=true

# gRPC client: order service (update order with shipment_id and status shipped/delivered)
grpc.client.orderService.address=static://localhost:9004
grpc.client.orderService.negotiationType=plaintext
grpc.client.orderService.enable-keep-alive=true