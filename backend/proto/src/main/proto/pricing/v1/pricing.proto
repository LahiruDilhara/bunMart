syntax = "proto3";

package bunmart.pricing.v1;

option java_package = "com.nsbm.bunmart.pricing.v1";
option java_multiple_files = true;

// Aligned with pricing Product (rawPrice, tax, currencyCode), ProductPriceInfoDTO, CalculatePriceRequestDTO/ResponseDTO, Coupon.
service PricingService {
  rpc GetProductPrice(GetProductPriceRequest) returns (GetProductPriceResponse);
  rpc CalculateOrderPricing(CalculateOrderPricingRequest) returns (CalculateOrderPricingResponse);
  rpc ValidateCoupon(ValidateCouponRequest) returns (ValidateCouponResponse);
}

message GetProductPriceRequest {
  string user_id = 1;
  string product_id = 2;
}

// ProductPriceInfoDTO: productId, currentPrice, rawPrice, tax, currency from Product entity.
message GetProductPriceResponse {
  string product_id = 1;
  string unit_price = 2;   // currentPrice
  string raw_price = 3;
  string tax = 4;
  string currency_code = 5;
}

// CalculatePriceRequestDTO.LineItemDTO: productId, quantity.
message LineItem {
  string product_id = 1;
  int32 quantity = 2;
}

message CalculateOrderPricingRequest {
  string user_id = 1;
  repeated LineItem items = 2;
  string coupon_code = 3;
}

// CalculatePriceResponseDTO.LineItemPriceDTO: productId, quantity, unitPrice, lineTotal; response has subtotal, discountTotal, shippingTotal, taxTotal, total.
message LineResult {
  string product_id = 1;
  int32 quantity = 2;
  string unit_price = 3;
  string line_total = 4;
}

message CalculateOrderPricingResponse {
  repeated LineResult lines = 1;
  string subtotal = 2;
  string discount_total = 3;
  string shipping_total = 4;
  string tax_total = 5;
  string total = 6;
  string currency_code = 7;
}

message ValidateCouponRequest {
  string user_id = 1;
  string coupon_code = 2;
}

// Coupon entity: code, type, value; validation returns whether valid and discount amount.
message ValidateCouponResponse {
  bool valid = 1;
  string discount_amount = 2;
}
