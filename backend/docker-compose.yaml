    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-shipping:5432/bunmart_shipping
      SPRING_DATASOURCE_USERNAME: bunmart
      SPRING_DATASOURCE_PASSWORD: bunmart_pass
    depends_on:
      db-shipping:
        condition: service_healthy

  userauthenticationservice:
    build:
      context: .
      dockerfile: userAuthentication/Dockerfile
    image: bunmart-userauthenticationservice:latest
    pull_policy: build
    container_name: bunmart-userauthenticationservice
    restart: unless-stopped
    ports:
      - "6001:6001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-auth:5432/bunmart_auth
      SPRING_DATASOURCE_USERNAME: bunmart
      SPRING_DATASOURCE_PASSWORD: bunmart_pass
    depends_on:
      db-auth:
        condition: service_healthy

  db-product:
    image: postgres:16-alpine
    container_name: bunmart-db-product
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bunmart_product
      POSTGRES_USER: bunmart
      POSTGRES_PASSWORD: bunmart_pass
    volumes:
      - db_product_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunmart -d bunmart_product"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-kitchen:
    image: postgres:16-alpine
    container_name: bunmart-db-kitchen
