syntax = "proto3";

package bunmart.kitchen.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.nsbm.bunmart.kitchen.v1";
option java_multiple_files = true;

// Aligned with KitchenOrder / KitchenOrderLine entity and KitchenOrderResponseDTO / KitchenOrderLineDTO.
// KitchenOrder: id, userId, orderId, status, createdAt, updatedAt, lines.
// KitchenOrderLine: id, productId, quantity, progress, status.
service KitchenService {
  rpc CreateKitchenOrder(CreateKitchenOrderRequest) returns (CreateKitchenOrderResponse);
  rpc GetKitchenOrder(GetKitchenOrderRequest) returns (GetKitchenOrderResponse);
  rpc UpdateKitchenOrderStatus(UpdateKitchenOrderStatusRequest) returns (UpdateKitchenOrderStatusResponse);
}

message KitchenOrderLineInfo {
  string line_id = 1;
  string product_id = 2;
  int32 quantity = 3;
  int32 progress = 4;
  string status = 5;
}

message KitchenOrderInfo {
  string kitchen_order_id = 1;
  string user_id = 2;
  string order_id = 3;
  string status = 4;
  repeated KitchenOrderLineInfo lines = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateKitchenOrderRequest {
  string user_id = 1;
  string order_id = 2;
  repeated KitchenOrderLineInput lines = 3;
}

message KitchenOrderLineInput {
  string product_id = 1;
  int32 quantity = 2;
}

message CreateKitchenOrderResponse {
  string kitchen_order_id = 1;
}

message GetKitchenOrderRequest {
  string kitchen_order_id = 1;
}

message GetKitchenOrderResponse {
  KitchenOrderInfo order = 1;
}

message UpdateKitchenOrderStatusRequest {
  string kitchen_order_id = 1;
  string status = 2;
}

message UpdateKitchenOrderStatusResponse {
  bool updated = 1;
}
