# Build and push bunmart-frontend Docker image to Nexus.
# Manually triggered only. Hosted at bunmart.lahirudilhara.me.
# Secrets: REGISTRY_USERNAME, REGISTRY_PASSWORD
name: Build and Push Frontend Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the Docker image (e.g. v1.0.0)"
        required: true
        type: string

env:
  REGISTRY: nexus.lahirudilhara.me
  IMAGE_PREFIX: lahirudilhara
  IMAGE_NAME: bunmart-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set version variable
        id: vars
        run: |
          V="${{ github.event.inputs.version }}"
          if [[ -z "$V" ]]; then
            V="v0.0.0"
          elif [[ ! "$V" =~ ^v ]]; then
            V="v${V}"
          fi
          echo "VERSION=${V}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: bunmart-frontend
          file: bunmart-frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
