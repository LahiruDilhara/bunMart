spring.application.name=bunMart
server.port=6004
grpc.server.port=9003

spring.datasource.url=jdbc:postgresql://localhost:5435/bunmart
spring.datasource.username=bunmart
spring.datasource.password=bunmart_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

grpc.client.orderService.address=static://localhost:9004
grpc.client.orderService.enable-keep-alive=true
grpc.client.orderService.negotiationType=plaintext