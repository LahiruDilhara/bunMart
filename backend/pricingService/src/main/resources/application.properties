spring.application.name=bunmart-pricing-service

# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://127.0.0.1:1433;databaseName=bunmart_pricing;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=BunMart@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.nsbm.bunmart.pricing=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.data=DEBUG
logging.level.org.springframework.web.cors=DEBUG

# Server Ports
grpc.server.port=9093
server.port=8080

# Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000